// Curated subset of the official meshtastic/protobufs used by this firmware.
//
// Field numbers and wire types are pinned to upstream mesh.proto / portnums.proto
// so packets interoperate byte-for-byte with stock Meshtastic. Enum-typed fields
// (location_source, hw_model, role) are modelled as int32/uint32 here — identical
// on the wire (varint) — to avoid pulling in the full enum trees. Only the
// messages this badge sends/receives are included: Data, Position, User.
syntax = "proto3";

package meshtastic;

// portnums.proto (subset)
enum PortNum {
  UNKNOWN_APP = 0;
  TEXT_MESSAGE_APP = 1;
  POSITION_APP = 3;
  NODEINFO_APP = 4;
  ROUTING_APP = 5;
  ADMIN_APP = 6;
  TELEMETRY_APP = 67;
  TRACEROUTE_APP = 70;
}

// mesh.proto: Data — the decrypted payload of every MeshPacket.
message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  fixed32 emoji = 8;
}

// mesh.proto: Position (POSITION_APP payload).
message Position {
  sfixed32 latitude_i = 1;   // degrees * 1e7
  sfixed32 longitude_i = 2;  // degrees * 1e7
  int32 altitude = 3;        // metres MSL
  fixed32 time = 4;          // unix seconds
  int32 location_source = 5; // LocSource enum (varint)
  uint32 ground_speed = 15;  // metres per second
  uint32 ground_track = 16;  // heading, degrees * 1e-5
  uint32 sats_in_view = 19;
  uint32 precision_bits = 23;
}

// telemetry.proto: DeviceMetrics + Telemetry (TELEMETRY_APP payload). Only the
// device_metrics variant is modelled (field 2); other variants decode as absent.
message DeviceMetrics {
  uint32 battery_level = 1;
  float voltage = 2;
  float channel_utilization = 3;
  float air_util_tx = 4;
  uint32 uptime_seconds = 5;
}

message EnvironmentMetrics {
  float temperature = 1;          // degrees C
  float relative_humidity = 2;    // percent
  float barometric_pressure = 3;  // hPa
}

message Telemetry {
  fixed32 time = 1;
  DeviceMetrics device_metrics = 2;
  EnvironmentMetrics environment_metrics = 3;
}

// mesh.proto: User (NODEINFO_APP payload).
message User {
  string id = 1;          // "!aabbccdd"
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4;
  int32 hw_model = 5;     // HardwareModel enum (varint)
  bool is_licensed = 6;
  int32 role = 7;         // DeviceRole enum (varint)
}

// --- BLE companion API (subset of mesh.proto used over the phone link) ------

message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;
  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }
  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  int32 rx_rssi = 12;
}

message MyNodeInfo {
  uint32 my_node_num = 1;
}

message NodeInfo {
  uint32 num = 1;
  User user = 2;
  Position position = 3;
  float snr = 4;
  fixed32 last_heard = 5;
  DeviceMetrics device_metrics = 6;
}

message ChannelSettings {
  bytes psk = 2;
  string name = 3;
}

message Channel {
  int32 index = 1;
  ChannelSettings settings = 2;
  int32 role = 3;   // 0 disabled, 1 primary, 2 secondary
}

message ToRadio {
  oneof payload_variant {
    MeshPacket packet = 1;
    uint32 want_config_id = 3;
    bool disconnect = 4;
  }
}

message FromRadio {
  uint32 id = 1;
  oneof payload_variant {
    MeshPacket packet = 2;
    MyNodeInfo my_info = 3;
    NodeInfo node_info = 4;
    uint32 config_complete_id = 7;
    Channel channel = 10;
  }
}
